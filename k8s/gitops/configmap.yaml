apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  SERVER_PORT: "8081"
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql-service:3306/Suivi_DB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
  SPRING_DATASOURCE_USERNAME: appuser
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_FORMAT_SQL: "false"
  JWT_EXPIRATION: "86400000"
  APP_CORS_ALLOWED_ORIGINS: http://project-management.local
