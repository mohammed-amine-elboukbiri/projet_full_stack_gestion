services:
  mysql:
    image: mysql:8.4
    container_name: zentask-mysql
    environment:
      MYSQL_DATABASE: Suivi_DB
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      TZ: Africa/Casablanca
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zentask-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/Suivi_DB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SERVER_PORT: 8081
      TZ: Africa/Casablanca
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /
    container_name: zentask-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data: