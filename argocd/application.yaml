apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-management
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mohammed-amine-elboukbiri/Application-Full-Stack-de-Gestion-de-Projets.git
    targetRevision: main
    path: k8s/gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: project-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
